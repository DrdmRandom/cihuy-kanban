services:
  portfolio:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dawwi-portfolio
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
      NEXT_PUBLIC_STRAPI_URL: ${NEXT_PUBLIC_STRAPI_URL:-https://strapi.cihuy-familly.my.id}
    restart: unless-stopped
